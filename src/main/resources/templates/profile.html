<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | UniEvent</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/profile.css">
</head>
<body>

<div class="dashboard-container">
    <aside class="sidebar" id="sidebarMenu">
        <div>
            <div class="sidebar-logo-section">
                <div class="logo">
                    <i class="fas fa-bell"></i>
                    <span>EventReminder</span>
                </div>
            </div>

            <div class="user-profile-section">
                <div class="profile-icon-avatar">
                    <i class="fa-solid fa-user"></i>
                </div>
                <h3 th:text="${user.fullName}">Student Name</h3>
                <p th:text="${user.department} + ' Student'">Student</p>
                <button class="view-profile-btn active" onclick="window.location.href='/profile'">
                    <i class="fa-solid fa-user"></i> My Profile
                </button>
            </div>

            <nav class="sidebar-menu">
                <a href="/dashboard" class="menu-item"><i class="fa-solid fa-border-all"></i> Dashboard</a>
                <a href="/my-events" class="menu-item"><i class="fa-solid fa-calendar-check"></i> My Events</a>
                <a href="/reminders" class="menu-item">
                    <i class="fa-solid fa-bell"></i> Reminders
                </a>
            </nav>
        </div>

        <div class="sidebar-footer">
            <a href="#" class="logout-btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Log Out</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="navbar">
            <div class="left-navbar-section">
                <div class="menu-toggle-btn" onclick="toggleSidebar()">
                    <i class="fa-solid fa-bars"></i>
                </div>
                <div class="logo">
                    <i class="fas fa-bell"></i>
                    <span>My Profile</span>
                </div>
            </div>
        </header>

        <!-- Profile Info -->
        <div class="profile-header">
            <div class="profile-avatar">
                <i class="fa-solid fa-user-graduate"></i>
            </div>
            <div class="profile-info">
                <h1 th:text="${user.fullName}">Student Name</h1>
                <p><i class="fa-solid fa-envelope"></i> <span th:text="${user.email}">email@university.edu</span></p>
                <p><i class="fa-solid fa-building-columns"></i> <span th:text="${user.department} + ' Department'">Computer Science Department</span></p>
                <p><i class="fa-solid fa-user-tag"></i> <span th:text="${user.role}">Student</span></p>
            </div>
        </div>

        <!-- Statistics -->
        <div class="stats-section">
            <h2><i class="fa-solid fa-chart-simple"></i> My Statistics</h2>
            <div class="stats-cards">
                <div class="stat-card">
                    <i class="fa-solid fa-calendar-check"></i>
                    <div class="stat-number" id="totalEvents">0</div>
                    <div class="stat-label">Total Registered</div>
                </div>
                <div class="stat-card">
                    <i class="fa-solid fa-check-circle"></i>
                    <div class="stat-number" id="attendedEvents">0</div>
                    <div class="stat-label">Attended</div>
                </div>
                <div class="stat-card">
                    <i class="fa-solid fa-clock"></i>
                    <div class="stat-number" id="upcomingEvents">0</div>
                    <div class="stat-label">Upcoming</div>
                </div>
                <div class="stat-card">
                    <i class="fa-solid fa-certificate"></i>
                    <div class="stat-number" id="certificatesEarned">0</div>
                    <div class="stat-label">Certificates</div>
                </div>
            </div>
        </div>

        <div class="attended-section">
            <h2><i class="fa-solid fa-check-circle"></i> Attended Events</h2>
            <div id="attendedEventsList" class="attended-list">
                <div class="empty-state">Loading...</div>
            </div>
        </div>

    </main>
</div>

<script src="/js/profile.js"></script>
</body>
</html>
