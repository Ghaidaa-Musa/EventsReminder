<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Event Reminder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- Navbar -->
<header class="navbar">
    <div class="logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#D97706" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
    </div>

</header>

<!-- Hero Section -->
<main class="hero-container">

    <div class="hero-content">
        <h1 class="main-title">University Event Reminder</h1>
        <p class="subtitle">Never miss an important event again</p>

        <div class="button-group">
            <a th:href="@{/register}" class="btn btn-signup">Sign Up</a>
            <a th:href="@{/login}" class= "btn btn-login">Log In</a>

        </div>
    </div>

    <div class="hero-image">
        <img th:src="@{/images/cale.png}" alt="University Event">
    </div>

</main>

</body>
</html>
